<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="wrapper">
      <header></header>
      <main>
        <section class="space">
          <div class="space__container">
            <div class="moon"></div>
            <div class="earth"></div>
            <div class="spaceman"></div>
            <div class="message">
              <h1>До Місяця долетіли, і курс закінчимо! 🚀</h1>
            </div>

            <div class="rocket">
              <div class="rocket__body">
                <div class="rocket__porthole porthole1"></div>
                <div class="rocket__porthole porthole2"></div>
                <div class="rocket__porthole porthole3"></div>
              </div>

              <div class="rocket__fastening rocket__fastening--left"></div>
              <div class="rocket__fastening rocket__fastening--right"></div>

              <div class="rocket__fire"></div>
            </div>
          </div>
        </section>
      </main>
      <footer></footer>
    </div>
  </body>
</html>
