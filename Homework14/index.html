<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homework 14</title>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="wrapper">
      <header id="top" class="header">
        <div class="header__container">
          <h1 class="header__title">Заняття 14 HTML Форми</h1>
        </div>
      </header>

      <main class="page">
        <div class="page__container">
          <section class="page__feedback feedback">
            <h2 class="visually-hidden">Feedback Form</h2>
            <form class="feedback__body" action="#" method="post">
              <div class="feedback__column">
                <label for="user-name" class="feedback__label">Your name</label>
                <input
                  class="feedback__input"
                  id="user-name"
                  type="text"
                  name="userName"
                  placeholder="Abc"
                  required
                  autocomplete="off"
                />
              </div>

              <div class="feedback__column">
                <label for="email" class="feedback__label">Email address</label>
                <input
                  class="feedback__input"
                  type="email"
                  id="email"
                  name="userEmail"
                  placeholder="Abc@def.com"
                  required
                  autocomplete="off"
                />
              </div>

              <div class="feedback__column">
                <label for="subject" class="feedback__label">Subject</label>
                <input
                  class="feedback__input"
                  type="text"
                  id="subject"
                  name="userSubject"
                  placeholder="This is an optional"
                  autocomplete="off"
                />
              </div>

              <div class="feedback__column">
                <label for="message" class="feedback__label">Message</label>
                <textarea
                  class="feedback__input feedback__input--area"
                  name="message"
                  id="message"
                  placeholder="Hi! i’d like to ask about"
                  required
                ></textarea>
              </div>

              <button type="submit" class="feedback__button">Submit</button>
            </form>
          </section>

          <section class="page__options options">
            <div class="options__block options__block--size">
              <h2 class="options__title">Size</h2>

              <div class="options__grid">
                <input
                  class="options__radio-input"
                  type="radio"
                  id="size-l"
                  value="l"
                  name="size"
                  checked
                />
                <label class="options__label" for="size-l">L</label>

                <input
                  class="options__radio-input"
                  type="radio"
                  id="size-xl"
                  value="xl"
                  name="size"
                />
                <label class="options__label" for="size-xl">XL</label>

                <input
                  class="options__radio-input"
                  type="radio"
                  id="size-xs"
                  value="xs"
                  name="size"
                />
                <label class="options__label" for="size-xs">XS</label>
              </div>
            </div>

            <div class="options__block options__block--color">
              <h3 class="options__title">Color</h3>

              <div class="options__grid">
                <div class="options__color-item">
                  <input
                    class="options__radio-input"
                    type="radio"
                    name="color"
                    id="color-1"
                    value="purple"
                    checked
                  />
                  <label
                    class="options__color-label options__color-label--purple"
                    for="color-1"
                  ></label>
                </div>

                <div class="options__color-item">
                  <input
                    class="options__radio-input"
                    type="radio"
                    name="color"
                    id="color-2"
                    value="black"
                  />
                  <label
                    class="options__color-label options__color-label--black"
                    for="color-2"
                  ></label>
                </div>

                <div class="options__color-item">
                  <input
                    class="options__radio-input"
                    type="radio"
                    name="color"
                    id="color-3"
                    value="brown"
                  />
                  <label
                    class="options__color-label options__color-label--brown"
                    for="color-3"
                  ></label>
                </div>
              </div>
            </div>
          </section>

          <section class="page__other">
            <h2 class="visually-hidden">Feedback Form</h2>
            <form class="search-form" action="/search" method="get">
              <label class="search-form__label" for="search"
                >Глобальний пошук</label
              >
              <input
                class="search-form__input"
                type="search"
                id="search"
                name="search"
                placeholder="Пошук"
              />
              <button class="search-form__button" type="submit">Знайти</button>
            </form>

            <form
              class="practice-form"
              action="#"
              method="post"
              enctype="multipart/form-data"
            >
              <label for="name">Ваше ім'я</label>
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Введіть ім'я"
                required
                minlength="3"
              />
              <label for="mail">Ваш пошта</label>
              <input
                type="email"
                id="mail"
                name="mail"
                placeholder="Введіть вашу пошту"
                required
              />
              <label for="password">Ваш пароль</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Введіть ваш пароль"
                required
                minlength="3"
              />
              <label for="tel">Ваш номер</label>
              <input
                type="tel"
                id="tel"
                name="tel"
                placeholder="Введіть ваш номер"
                required
                pattern="[0-9]{10,12}"
              />
              <label for="color">Виберіть гарний колір</label>
              <input type="color" id="color" name="color" />

              <label for="range">Виберіть діапазон</label>
              <input
                type="range"
                id="range"
                name="range"
                min="0"
                max="100"
                step="5"
              />
              <label for="file">Завантажте файли</label>
              <input
                type="file"
                id="file"
                name="file"
                accept=".jpg,.png,.pdf"
              />

              <label for="country">Країна</label>
              <select id="country" name="country">
                <option value="ua" selected>Україна</option>
                <option value="pl">Польща</option>
                <option value="us">США</option>
              </select>
            </form>
          </section>
        </div>
      </main>

      <footer class="footer">
        <div class="footer__container">
          <a class="footer__link" href="#top">На гору</a>
        </div>
      </footer>
    </div>
  </body>
</html>
